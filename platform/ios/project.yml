name: HangeWubi
options:
  bundleIdPrefix: com.hangewubi
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "16.4"

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 7H7QT6A3TG
    SUPPORTED_PLATFORMS: iphoneos iphonesimulator
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "9"

targets:
  HangeWubi:
    type: application
    platform: iOS
    sources:
      - path: HangeWubi
      - path: HangeWubi/PrivacyInfo.xcprivacy
        buildPhase: resources
    info:
      path: HangeWubi/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: SystemBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).SceneDelegate"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hangewubi.app
        PRODUCT_NAME: HangeWubi
        INFOPLIST_FILE: HangeWubi/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HangeWubi/HangeWubi.entitlements
    dependencies:
      - target: HangeWubiKeyboard

  HangeWubiKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: HangeWubiKeyboard
      - path: HangeWubiKeyboard/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: ../../data/wubi86.txt
        buildPhase: resources
      - path: ../../data/config.toml
        buildPhase: resources
    info:
      path: HangeWubiKeyboard/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: 晗戈五笔
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).KeyboardViewController"
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: zh-Hans
            RequestsOpenAccess: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hangewubi.app.keyboard
        PRODUCT_NAME: HangeWubiKeyboard
        INFOPLIST_FILE: HangeWubiKeyboard/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: HangeWubiKeyboard/HangeWubiKeyboard.entitlements
        SKIP_INSTALL: "YES"
        APPLICATION_EXTENSION_API_ONLY: "YES"
        SWIFT_OBJC_BRIDGING_HEADER: HangeWubiKeyboard/BridgingHeader.h
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../../target/aarch64-apple-ios/release"
          - "$(PROJECT_DIR)/../../target/aarch64-apple-ios/debug"
          - "$(PROJECT_DIR)/../../target/aarch64-apple-ios-sim/release"
          - "$(PROJECT_DIR)/../../target/aarch64-apple-ios-sim/debug"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../../include"
        OTHER_LDFLAGS:
          - "-lhangewubi"
    dependencies: []
