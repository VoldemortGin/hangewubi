name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: 构建 Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --lib
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: hangewubi-windows
          path: |
            target/release/hangewubi.dll
            target/release/hangewubi-cli.exe
